<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas - Versão Vetor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        input {
            width: 70%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 20px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .btn-adicionar {
            background-color: #667eea;
            color: white;
        }

        .btn-remover-ultima {
            background-color: #f39c12;
            color: white;
        }

        .btn-limpar {
            background-color: #e74c3c;
            color: white;
        }

        .contador {
            text-align: center;
            margin: 20px 0;
            font-size: 18px;
            color: #555;
        }

        .contador span {
            font-weight: bold;
            color: #667eea;
            font-size: 24px;
        }

        ul {
            list-style: none;
            margin-top: 20px;
        }

        li {
            background: #f8f9fa;
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        footer {
            text-align: center;
            margin-top: 25px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Lista de Tarefas</h1>
        
        <input type="text" id="inputTarefa" placeholder="Digite uma nova tarefa...">
        <button class="btn-adicionar" id="btnAdicionar">Adicionar</button>
        
        <div class="contador">
            Total de tarefas: <span id="contador">0</span>
        </div>
        
        <button class="btn-remover-ultima" id="btnRemoverUltima">Remover Última</button>
        <button class="btn-limpar" id="btnLimparLista">Limpar Lista</button>
        
        <ul id="listaTarefas"></ul>
        
        <footer>💡 As tarefas são guardadas em um VETOR (array)</footer>
    </div>

    <script>
        // VETOR (ARRAY) - ONDE AS TAREFAS SÃO GUARDADAS
        const listaDeTarefas = [];

        // PEGANDO OS ELEMENTOS DO HTML
        const inputTarefa = document.getElementById('inputTarefa');
        const btnAdicionar = document.getElementById('btnAdicionar');
        const btnRemoverUltima = document.getElementById('btnRemoverUltima');
        const btnLimparLista = document.getElementById('btnLimparLista');
        const listaTarefasDOM = document.getElementById('listaTarefas');
        const contadorSpan = document.getElementById('contador');

        // FUNÇÃO PARA MOSTRAR AS TAREFAS NA TELA
        function renderizarTarefas() {
            listaTarefasDOM.innerHTML = "";
            
            for (let i = 0; i < listaDeTarefas.length; i++) {
                const tarefa = listaDeTarefas[i];
                const novoItem = document.createElement('li');
                novoItem.textContent = (i + 1) + ". " + tarefa;
                listaTarefasDOM.appendChild(novoItem);
            }
            
            contadorSpan.textContent = listaDeTarefas.length;
        }

        // ADICIONAR TAREFA
        btnAdicionar.addEventListener('click', function() {
            const textoTarefa = inputTarefa.value.trim();
            
            if (textoTarefa !== "") {
                listaDeTarefas.push(textoTarefa);
                inputTarefa.value = "";
                renderizarTarefas();
            } else {
                alert("Por favor, digite uma tarefa válida!");
            }
        });

        // REMOVER ÚLTIMA TAREFA
        btnRemoverUltima.addEventListener('click', function() {
            if (listaDeTarefas.length > 0) {
                listaDeTarefas.pop();
                renderizarTarefas();
            } else {
                alert("A lista já está vazia!");
            }
        });

        // LIMPAR LISTA INTEIRA
        btnLimparLista.addEventListener('click', function() {
            if (listaDeTarefas.length > 0) {
                listaDeTarefas.length = 0;
                renderizarTarefas();
                alert("Lista limpa com sucesso!");
            } else {
                alert("A lista já está vazia!");
            }
        });

        // APERTAR ENTER NO CAMPO DE TEXTO TAMBÉM ADICIONA
        inputTarefa.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                btnAdicionar.click();
            }
        });
    </script>
</body>
</html>
